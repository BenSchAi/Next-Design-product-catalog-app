name: Auto Image Scraper Robot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape_images:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Spire.Xls and Dependencies
      run: |
        pip install Spire.Xls google-api-python-client google-auth-httplib2 google-auth-oauthlib Pillow

    - name: Run the Scraper Robot
      run: python EXTRACTOR/image_scraper.py
